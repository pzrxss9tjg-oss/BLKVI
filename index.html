<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BLKVI | Private Protection</title>
<style>
  :root{
    --bg:#020202;
    --panel:#050505;
    --line:rgba(255,255,255,.12);
    --line-soft:rgba(255,255,255,.08);
    --text:#f5f5f5;
    --muted:rgba(255,255,255,.72);
    --soft:rgba(255,255,255,.44);
    --shadow:0 14px 36px rgba(0,0,0,.55);
    --button-shadow:0 10px 24px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.05);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);}
  body{
    font-family:Inter, Arial, Helvetica, sans-serif;
    overflow:hidden;
    letter-spacing:.01em;
    background:
      radial-gradient(circle at 50% 22%, rgba(255,255,255,.05), transparent 28%),
      linear-gradient(180deg, #050505 0%, #020202 100%);
  }

  a{color:inherit;text-decoration:none;}
  img{display:block;max-width:100%;}

  .shell{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    isolation:isolate;
  }

  .shell::before,
  .shell::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
  }

  .shell::before{
    background:
      linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px);
    background-size:100% 46px, 46px 100%;
    opacity:.35;
    mix-blend-mode:screen;
  }

  .shell::after{
    background:radial-gradient(circle at center, transparent 52%, rgba(0,0,0,.34) 100%);
  }

  .topbar{
    position:relative;
    z-index:2;
    width:100%;
    background:linear-gradient(180deg, rgba(0,0,0,.98) 0%, rgba(0,0,0,.94) 100%);
    border-bottom:1px solid var(--line);
    box-shadow:0 18px 44px rgba(0,0,0,.55);
  }

  .nav-wrap{
    width:min(100%, calc(100% - 56px));
    margin:0 auto;
    min-height:174px;
    display:grid;
    grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
    align-items:center;
    gap:22px;
  }

  .nav-side{
    display:grid;
    grid-template-columns:repeat(2, minmax(140px, 1fr));
    gap:14px;
    width:100%;
    min-width:0;
  }

  .nav-pill{
    min-height:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 18px;
    border-radius:16px;
    text-transform:uppercase;
    letter-spacing:.18em;
    font-size:.8rem;
    color:rgba(255,255,255,.88);
    background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.1);
    box-shadow:var(--button-shadow);
    transition:transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease;
    white-space:nowrap;
  }

  .nav-pill:hover{
    transform:translateY(-1px);
    border-color:rgba(255,255,255,.22);
    background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.03));
    color:#fff;
  }

  .brand-logo-link{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:10px 0;
  }

  .brand-logo{
    width:min(460px, 34vw);
    min-width:260px;
    height:auto;
    filter:grayscale(1) contrast(1.08) brightness(1.08) drop-shadow(0 16px 28px rgba(0,0,0,.5));
  }

  .main-stage{
    position:relative;
    z-index:1;
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .stage-center{
    text-align:center;
    color:var(--soft);
    text-transform:uppercase;
    letter-spacing:.4em;
    font-size:.74rem;
    opacity:.38;
    user-select:none;
  }

  .footer{
    position:relative;
    z-index:2;
    border-top:1px solid var(--line-soft);
    background:rgba(4,4,4,.95);
    padding:18px 0 24px;
  }

  .footer-line{
    width:min(100%, calc(100% - 56px));
    margin:0 auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    color:var(--muted);
    font-size:.78rem;
    text-transform:uppercase;
    letter-spacing:.14em;
  }

  .footer a{color:rgba(255,255,255,.82);}
  .footer a:hover{color:#fff;}

  .loading-screen{
    position:fixed;
    inset:0;
    z-index:999;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px;
    background:
      radial-gradient(circle at 50% 28%, rgba(255,255,255,.05), transparent 24%),
      linear-gradient(180deg, rgba(10,10,10,.985) 0%, rgba(2,2,2,.995) 100%);
    transition:opacity .45s ease, visibility .45s ease;
  }

  .loading-screen.hidden{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }

  .loading-screen::before,
  .loading-screen::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
  }

  .loading-screen::before{
    background:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size:100% 34px, 34px 100%;
    opacity:.35;
  }

  .loading-screen::after{
    background:radial-gradient(circle at center, transparent 54%, rgba(0,0,0,.45) 100%);
  }

  .loading-panel{
    position:relative;
    width:min(520px, 100%);
    padding:40px 28px;
    border-radius:22px;
    background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    border:1px solid rgba(255,255,255,.1);
    box-shadow:0 18px 50px rgba(0,0,0,.58), inset 0 1px 0 rgba(255,255,255,.05);
    text-align:center;
  }

  .loading-kicker{
    margin:0 0 10px;
    font-size:.72rem;
    letter-spacing:.42em;
    text-transform:uppercase;
    color:rgba(255,255,255,.48);
  }

  .loading-percent{
    margin:0;
    font-size:clamp(3.6rem, 11vw, 7rem);
    line-height:1;
    font-weight:600;
    letter-spacing:.08em;
    color:rgba(255,255,255,.94);
    text-shadow:0 0 24px rgba(255,255,255,.06);
  }

  .progress-track{
    margin:22px auto 0;
    width:100%;
    height:10px;
    border-radius:999px;
    overflow:hidden;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.08);
  }

  .progress-bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg, rgba(255,255,255,.22), rgba(255,255,255,.88), rgba(255,255,255,.22));
    box-shadow:0 0 18px rgba(255,255,255,.16);
    transition:width .08s linear;
  }

  @media (max-width:980px){
    body{overflow:auto;}
    .nav-wrap{
      width:min(100%, calc(100% - 30px));
      min-height:auto;
      padding:18px 0 20px;
      grid-template-columns:1fr;
      gap:14px;
    }
    .nav-side{
      width:min(100%, 560px);
      justify-self:center;
    }
    .brand-logo{
      width:min(400px, 72vw);
      min-width:0;
    }
    .footer-line{width:min(100%, calc(100% - 30px));}
  }

  @media (max-width:680px){
    .nav-side{
      grid-template-columns:1fr 1fr;
      gap:12px;
      width:100%;
    }
    .nav-pill{
      min-height:48px;
      font-size:.72rem;
      letter-spacing:.14em;
      border-radius:14px;
    }
    .footer-line{
      flex-direction:column;
      align-items:flex-start;
      font-size:.72rem;
    }
    .loading-panel{padding:30px 18px;}
  }
</style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen" aria-live="polite">
    <div class="loading-panel">
      <div class="loading-kicker">BLKVI</div>
      <div class="loading-percent"><span id="loadingPercent">0</span>%</div>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
  </div>

  <div class="shell">
    <header class="topbar">
      <div class="nav-wrap">
        <nav class="nav-side left" aria-label="Primary navigation left">
          <a class="nav-pill" href="about.html">About</a>
          <a class="nav-pill" href="services.html">Services</a>
        </nav>

        <a class="brand-logo-link" href="index.html" aria-label="BLKVI home">
          <img class="brand-logo" src="assets/img/blkvi-car-logo.png" alt="BLKVI black luxury sedan logo" />
        </a>

        <nav class="nav-side right" aria-label="Primary navigation right">
          <a class="nav-pill" href="method.html">Method</a>
          <a class="nav-pill" href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="main-stage" aria-hidden="true">
      <div class="stage-center">Secure Presence // Discreat Footprint // Controlled Access</div>
    </main>

    <footer class="footer">
      <div class="footer-line">
        <div>© 2026 BLKVI</div>
        <div><a href="contact.html">Si vis pacem, para bellum</a></div>
      </div>
    </footer>
  </div>

<script>
(function(){
  const progressBar = document.getElementById('progressBar');
  const loadingPercent = document.getElementById('loadingPercent');
  const loadingScreen = document.getElementById('loadingScreen');

  let percent = 0;
  const interval = setInterval(() => {
    percent += Math.floor(Math.random() * 4) + 1;
    if (percent > 100) percent = 100;

    loadingPercent.textContent = percent;
    progressBar.style.width = percent + '%';

    if (percent >= 100) {
      clearInterval(interval);
      setTimeout(() => {
        loadingScreen.classList.add('hidden');
      }, 350);
    }
  }, 65);
})();
</script>
</body>
</html>
