<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BLKVI | Method</title>
<style>
  :root{
    --bg:#030303;
    --panel:#0a0a0a;
    --line:rgba(255,255,255,.10);
    --line-soft:rgba(255,255,255,.06);
    --text:#f4f4f4;
    --muted:rgba(255,255,255,.68);
    --soft:rgba(255,255,255,.42);
    --accent:#b79a72;
    --shadow:0 16px 40px rgba(0,0,0,.52);
    --tile-shadow:0 10px 24px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.04);
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text)}
  body{
    font-family:Inter, Arial, Helvetica, sans-serif;
    letter-spacing:.01em;
    background:linear-gradient(180deg, #050505 0%, #020202 100%);
    min-height:100vh;
  }

  a{color:inherit;text-decoration:none}
  button{font:inherit}

  .shell{
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  .topbar{
    width:100%;
    border-bottom:1px solid var(--line-soft);
    background:rgba(3,3,3,.96);
  }

  .nav-wrap{
    width:min(100%, calc(100% - 56px));
    margin:0 auto;
    min-height:156px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .nav-side{
    display:grid;
    grid-template-columns:repeat(4, minmax(170px, 1fr));
    gap:16px;
  }

  .nav-pill{
    min-height:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 18px;
    border-radius:18px;
    text-transform:uppercase;
    letter-spacing:.18em;
    font-size:.8rem;
    color:rgba(255,255,255,.88);
    background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015));
    border:1px solid rgba(255,255,255,.10);
    box-shadow:var(--tile-shadow);
    transition:transform .18s ease, border-color .18s ease, background .18s ease;
    white-space:nowrap;
  }

  .nav-pill:hover,
  .nav-pill.active{
    transform:translateY(-1px);
    border-color:rgba(255,255,255,.2);
    background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
  }

  .main-stage{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:52px 0 64px;
  }

  .method-frame{
    width:min(1200px, calc(100% - 56px));
    padding:34px;
    border:1px solid var(--line-soft);
    border-radius:28px;
    background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.008));
    box-shadow:var(--shadow);
  }

  .method-head{
    display:flex;
    justify-content:space-between;
    gap:18px;
    align-items:end;
    margin-bottom:26px;
  }

  .kicker{
    color:var(--accent);
    text-transform:uppercase;
    letter-spacing:.22em;
    font-size:.7rem;
    margin-bottom:10px;
  }

  .method-head h1{
    margin:0;
    font-size:clamp(1.8rem, 3vw, 2.8rem);
    letter-spacing:-.04em;
  }

  .tiles{
    display:grid;
    grid-template-columns:repeat(3, minmax(0,1fr));
    gap:18px;
  }

  .method-tile{
    min-height:168px;
    padding:20px 20px 18px;
    border-radius:22px;
    border:1px solid rgba(255,255,255,.10);
    background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.015));
    box-shadow:var(--tile-shadow);
    color:var(--text);
    cursor:pointer;
    text-align:left;
    transition:transform .18s ease, border-color .18s ease, background .18s ease;
  }

  .method-tile:hover{
    transform:translateY(-2px);
    border-color:rgba(255,255,255,.2);
    background:linear-gradient(180deg, rgba(255,255,255,.065), rgba(255,255,255,.02));
  }

  .tile-num{
    display:block;
    margin-bottom:12px;
    color:var(--soft);
    text-transform:uppercase;
    letter-spacing:.18em;
    font-size:.68rem;
  }

  .tile-title{
    display:block;
    font-size:1.08rem;
    line-height:1.18;
    text-transform:uppercase;
    letter-spacing:.09em;
    color:rgba(255,255,255,.96);
    max-width:15ch;
  }

  .tile-hint{
    display:block;
    margin-top:18px;
    font-size:.72rem;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--accent);
  }

  .footer{
    border-top:1px solid var(--line-soft);
    background:#040404;
  }

  .footer-line{
    width:min(100%, calc(100% - 56px));
    min-height:72px;
    margin:0 auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    color:var(--muted);
    font-size:.78rem;
    text-transform:uppercase;
    letter-spacing:.14em;
  }

  .footer a{color:rgba(255,255,255,.82)}
  .footer a:hover{color:#fff}

  .overlay{
    position:fixed;
    inset:0;
    z-index:999;
    background:rgba(0,0,0,.72);
    backdrop-filter:blur(8px);
    opacity:0;
    visibility:hidden;
    transition:.22s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:22px;
  }

  .overlay.open{
    opacity:1;
    visibility:visible;
  }

  .modal{
    width:min(700px, 100%);
    border-radius:24px;
    border:1px solid rgba(255,255,255,.12);
    background:linear-gradient(180deg, rgba(14,14,14,.96), rgba(7,7,7,.96));
    box-shadow:0 24px 70px rgba(0,0,0,.58);
    overflow:hidden;
  }

  .modal-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    padding:22px 22px 18px;
    border-bottom:1px solid rgba(255,255,255,.08);
  }

  .modal-kicker{
    color:var(--accent);
    text-transform:uppercase;
    letter-spacing:.22em;
    font-size:.68rem;
  }

  .modal-title{
    margin:10px 0 0;
    font-size:1.35rem;
    letter-spacing:-.03em;
  }

  .modal-close{
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.03);
    color:rgba(255,255,255,.88);
    width:42px;
    height:42px;
    border-radius:14px;
    cursor:pointer;
  }

  .modal-close:hover{background:rgba(255,255,255,.08)}

  .modal-body{
    padding:22px;
    color:var(--muted);
    line-height:1.8;
    font-size:1rem;
  }

  @media (max-width:1100px){
    .tiles{grid-template-columns:repeat(2, minmax(0,1fr))}
  }

  @media (max-width:900px){
    .nav-wrap{
      width:min(100%, calc(100% - 30px));
      min-height:auto;
      padding:20px 0;
    }
    .method-frame{
      width:min(100%, calc(100% - 30px));
      padding:22px;
    }
    .footer-line{
      width:min(100%, calc(100% - 30px));
    }
  }

  @media (max-width:680px){
    .nav-side{
      width:100%;
      grid-template-columns:1fr;
      gap:12px;
    }
    .nav-pill{
      min-height:48px;
      font-size:.72rem;
      border-radius:14px;
    }
    .tiles{grid-template-columns:1fr}
    .method-tile{min-height:138px}
    .footer-line{
      flex-direction:column;
      align-items:flex-start;
      font-size:.72rem;
    }
  }
</style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="nav-wrap">
        <nav class="nav-side" aria-label="Primary navigation">
          <a class="nav-pill" href="index.html">Home</a>
          <a class="nav-pill" href="about.html">About</a>
          <a class="nav-pill" href="services.html">Services</a>
          <a class="nav-pill" href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="main-stage">
      <section class="method-frame" aria-label="Method tiles">
        <div class="method-head">
          <div>
            <div class="kicker">Method</div>
            <h1>Select a principle.</h1>
          </div>
        </div>

        <div class="tiles">
          <button class="method-tile" data-kicker="01" data-title="Risk Assessment" data-copy="Every protection posture should begin with client profile, routine, visibility level, environment, schedule friction, access points, travel exposure, and credible threat indicators.">
            <span class="tile-num">01</span>
            <span class="tile-title">Risk Assessment</span>
            <span class="tile-hint">Open brief</span>
          </button>

          <button class="method-tile" data-kicker="02" data-title="Protective Intelligence" data-copy="Effective protection is not limited to physical presence. It uses information, observation, pattern awareness, and context to reduce exposure before movement begins.">
            <span class="tile-num">02</span>
            <span class="tile-title">Protective Intelligence</span>
            <span class="tile-hint">Open brief</span>
          </button>

          <button class="method-tile" data-kicker="03" data-title="Advance Planning" data-copy="Site review, movement timing, arrival and exit logic, staging, and fallback options make the visible part of security look calm.">
            <span class="tile-num">03</span>
            <span class="tile-title">Advance Planning</span>
            <span class="tile-hint">Open brief</span>
          </button>

          <button class="method-tile" data-kicker="04" data-title="Continuous Improvement" data-copy="Premium service improves after every movement. Friction points are reviewed, routines are refined, and the next detail is cleaner.">
            <span class="tile-num">04</span>
            <span class="tile-title">Continuous Improvement</span>
            <span class="tile-hint">Open brief</span>
          </button>

          <button class="method-tile" data-kicker="Client Experience" data-title="The Safest Detail Often Feels the Smoothest" data-copy="Clients rarely judge protection by technical terminology. They judge it by whether movement feels composed, family members feel reassured, logistics feel controlled, and privacy is preserved.">
            <span class="tile-num">Client Experience</span>
            <span class="tile-title">Smooth Client Experience</span>
            <span class="tile-hint">Open brief</span>
          </button>

          <button class="method-tile" data-kicker="Operating Principle" data-title="Discretion, Preparation, Restraint, Reliability" data-copy="Public-safe, high-trust execution depends on discretion, advance preparation, measured restraint, and reliable communication. Those are the visible signals of a disciplined protection standard.">
            <span class="tile-num">Operating Principle</span>
            <span class="tile-title">Core Operating Standard</span>
            <span class="tile-hint">Open brief</span>
          </button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-line">
        <div>© 2026 BLKVI</div>
        <div><a href="contact.html">Si vis pacem, para bellum</a></div>
      </div>
    </footer>
  </div>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <div>
          <div class="modal-kicker" id="modalKicker">Method</div>
          <h2 class="modal-title" id="modalTitle">Title</h2>
        </div>
        <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

<script>
(function(){
  const overlay = document.getElementById('overlay');
  const modalKicker = document.getElementById('modalKicker');
  const modalTitle = document.getElementById('modalTitle');
  const modalBody = document.getElementById('modalBody');
  const closeBtn = document.getElementById('modalClose');
  const tiles = document.querySelectorAll('.method-tile');

  function openModal(tile){
    modalKicker.textContent = tile.dataset.kicker || 'Method';
    modalTitle.textContent = tile.dataset.title || '';
    modalBody.textContent = tile.dataset.copy || '';
    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');
  }

  function closeModal(){
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
  }

  tiles.forEach(tile => tile.addEventListener('click', () => openModal(tile)));
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', (e) => { if(e.target === overlay) closeModal(); });
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });
})();
</script>
</body>
</html>
